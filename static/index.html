<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Workbook Analyzer for Tableau</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
<style>
  :root {
    --tc-blue:        #001942;
    --tc-mid:         #2F5B94;
    --tc-sky:         #4C9AED;
    --tc-light:       #EBF3FD;

    --bg-page:        #f0f4f8;
    --bg-card:        #ffffff;
    --bg-detail:      #f8fafd;
    --text-body:      #212529;
    --text-muted2:    #6c757d;
    --text-secondary2:#495057;
    --border-subtle:  #e9ecef;
    --card-shadow:    0 2px 8px rgba(0,25,66,.08);

    --badge-add:  #198754;
    --badge-del:  #dc3545;
    --badge-chg:  #fd7e14;
  }
  [data-theme="dark"] {
    --bg-page:        #0f1624;
    --bg-card:        #1a2540;
    --bg-detail:      #162035;
    --text-body:      #ffffff;
    --text-muted2:    #a0b8d8;
    --text-secondary2:#c0d0e8;
    --border-subtle:  #2a3a55;
    --card-shadow:    0 2px 8px rgba(0,0,0,.5);
  }

  body  { background: var(--bg-page); color: var(--text-body); font-size: 14px; transition: background .25s, color .25s; }
  .card { background: var(--bg-card); border-color: var(--border-subtle) !important; box-shadow: var(--card-shadow); }

  /* Navbar */
  .navbar { background: var(--tc-blue) !important; }
  .navbar-brand { font-weight: 700; font-size: 1.05rem; letter-spacing: .4px; }

  /* Tabs */
  .nav-tabs .nav-link         { color: var(--tc-mid) !important; font-weight: 500; border-color: transparent !important; background: transparent !important; }
  .nav-tabs .nav-link.active  { color: #fff !important; background: var(--tc-mid) !important; border-color: var(--tc-mid) !important; }
  [data-theme="dark"] .nav-tabs { border-color: var(--border-subtle); }
  [data-theme="dark"] .nav-tabs .nav-link        { color: #7eaee8 !important; border-color: transparent !important; background: transparent !important; }
  [data-theme="dark"] .nav-tabs .nav-link.active { color: #fff !important; background: var(--tc-mid) !important; border-color: var(--tc-mid) !important; }

  /* フォームコントロール */
  [data-theme="dark"] .form-control,
  [data-theme="dark"] .form-select {
    background: #1e2a42; color: var(--text-body); border-color: var(--border-subtle);
  }
  [data-theme="dark"] .form-control::placeholder { color: var(--text-muted2); }
  [data-theme="dark"] .form-control:focus,
  [data-theme="dark"] .form-select:focus {
    background: #1e2a42; border-color: var(--tc-sky); color: var(--text-body);
    box-shadow: 0 0 0 .2rem rgba(76,154,237,.2);
  }
  [data-theme="dark"] .form-select option { background: #1e2a42; color: var(--text-body); }

  /* テーブル */
  .table thead th { background: var(--tc-blue); color: #fff; white-space: nowrap; }
  .table-hover tbody tr:hover { background: var(--tc-light); }
  [data-theme="dark"] .table {
    --bs-table-bg: var(--bg-card);
    --bs-table-hover-bg: #1e2e50;
    --bs-table-color: var(--text-body);
    --bs-table-border-color: var(--border-subtle);
  }
  [data-theme="dark"] .table > :not(caption) > * > * {
    background-color: var(--bg-card) !important;
    color: var(--text-body) !important;
    border-color: var(--border-subtle) !important;
  }
  [data-theme="dark"] .table-hover > tbody > tr:hover > * { background-color: #1e2e50 !important; }

  /* ダークモード汎用 */
  [data-theme="dark"] .text-muted     { color: var(--text-muted2) !important; }
  [data-theme="dark"] .text-secondary { color: var(--text-secondary2) !important; }
  [data-theme="dark"] .badge.bg-secondary { background: #3a4d6a !important; color: #fff !important; }
  [data-theme="dark"] code  { color: var(--text-muted2); background: transparent; }
  [data-theme="dark"] small { color: var(--text-muted2); }

  /* 検索ドロップダウン */
  .wb-dropdown {
    display: none; position: absolute; z-index: 1050; width: 100%;
    max-height: 240px; overflow-y: auto;
    background: var(--bg-card); border: 1px solid var(--border-subtle);
    border-radius: 4px; box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .wb-item {
    padding: 8px 12px; cursor: pointer; font-size: .85rem;
    border-bottom: 1px solid var(--border-subtle); color: var(--text-body);
  }
  .wb-item:last-child { border-bottom: none; }
  .wb-item:hover { background: var(--tc-light); }
  [data-theme="dark"] .wb-item:hover { background: #1e3448; }

  /* 差分バッジ（ラベル） */
  .badge-add { background: #d1fae5; color: #065f46; }
  .badge-del { background: #fee2e2; color: #991b1b; }
  .badge-chg { background: #ffedd5; color: #92400e; }
  [data-theme="dark"] .badge-add { background: #064e3b; color: #6ee7b7; }
  [data-theme="dark"] .badge-del { background: #7f1d1d; color: #fca5a5; }
  [data-theme="dark"] .badge-chg { background: #78350f; color: #fcd34d; }

  /* 差分統計バッジ（メタバー） */
  .diff-stat-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: .82rem; font-weight: 600;
    border-radius: 20px; padding: 4px 12px;
  }
  .diff-stat-badge.new     { background: #d4f0da; color: #1a5c2a; }
  .diff-stat-badge.changed { background: #fff3cd; color: #7a5800; }
  .diff-stat-badge.deleted { background: #fde8e8; color: #8b1a1a; }
  [data-theme="dark"] .diff-stat-badge.new     { background: #0d3320; color: #4de87a; }
  [data-theme="dark"] .diff-stat-badge.changed { background: #3a2e00; color: #ffd55e; }
  [data-theme="dark"] .diff-stat-badge.deleted { background: #3a0a0a; color: #ff8080; }

  /* 差分セクション */
  .diff-section { margin-bottom: .75rem; border: 1px solid var(--border-subtle); border-radius: 10px; overflow: hidden; }
  .diff-section-header {
    font-size: .88rem; font-weight: 600;
    padding: 10px 16px; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 8px;
    transition: background .15s;
  }
  .diff-section-header:hover { filter: brightness(0.97); }
  .diff-section.new-section     .diff-section-header { background: #edfaf1; color: #1a5c2a; }
  .diff-section.changed-section .diff-section-header { background: #fffbec; color: #7a5800; }
  .diff-section.deleted-section .diff-section-header { background: #fff5f5; color: #8b1a1a; }
  .diff-section.neutral-section .diff-section-header { background: var(--bg-detail); color: var(--text-body); }
  [data-theme="dark"] .diff-section.new-section     .diff-section-header { background: #0d2a1a; color: #4de87a; }
  [data-theme="dark"] .diff-section.changed-section .diff-section-header { background: #2a2000; color: #ffd55e; }
  [data-theme="dark"] .diff-section.deleted-section .diff-section-header { background: #2a0808; color: #ff8080; }
  [data-theme="dark"] .diff-section.neutral-section .diff-section-header { background: var(--bg-detail); color: var(--text-body); }
  .diff-section-header .diff-count {
    margin-left: auto; font-size: .75rem; font-weight: 700;
    background: rgba(0,0,0,.08); border-radius: 12px; padding: 2px 9px;
  }
  [data-theme="dark"] .diff-section-header .diff-count { background: rgba(255,255,255,.1); }
  .diff-section-chevron { font-size: .8rem; transition: transform .2s; }
  .diff-section-header.collapsed .diff-section-chevron { transform: rotate(-90deg); }
  .diff-section-body { padding: 8px; background: var(--bg-card); }

  .diff-item { font-size: .82rem; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; background: var(--bg-page); color: var(--text-body); }
  .diff-item .text-muted { color: var(--text-muted2) !important; }
  .formula-box { font-family: monospace; font-size: .78rem; border-radius: 4px; padding: 4px 8px; margin-top: 4px; word-break: break-all; }
  .formula-old { background: #fff0f0; color: #c0392b; text-decoration: line-through; }
  .formula-new { background: #f0fff4; color: #1a7a3c; }
  [data-theme="dark"] .formula-old { background: #3d1010; color: #ff8080; }
  [data-theme="dark"] .formula-new { background: #0d2e18; color: #5ddb7a; }
  [data-theme="dark"] .diff-item    { background: #162035; }

  /* コピーボタン */
  .copy-formula-btn { opacity: 0; transition: opacity .15s; }
  tr:hover .copy-formula-btn, .copy-formula-btn:focus { opacity: 1; }
  .copy-formula-btn.copied { color: #27ae60 !important; border-color: #27ae60 !important; }

  /* Sankey */
  #sankey-container { position: relative; width: 100%; min-height: 400px; overflow: visible; }

  /* Sankey ツールチップ（CSSクラスでテーマ対応） */
  .sankey-tooltip {
    position: absolute;
    background: rgba(255,255,255,0.97);
    color: #222;
    border: 1px solid #ddd;
    border-radius: 7px;
    padding: 9px 12px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    white-space: pre-wrap;
    max-width: 380px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
    z-index: 100;
  }
  [data-theme="dark"] .sankey-tooltip {
    background: rgba(14,24,48,0.97);
    color: #dce8ff;
    border-color: rgba(80,140,220,0.35);
    box-shadow: 0 4px 20px rgba(0,0,0,.6);
  }
  [data-theme="dark"] .sankey-tooltip hr { border-color: rgba(80,140,220,0.25); }

  /* ステータスバー */
  #status-bar { font-size: .78rem; }
  .spinner-border-sm { width: 1rem; height: 1rem; }

  /* ローディングオーバーレイ */
  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,.88);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999;
  }
  [data-theme="dark"] #loading-overlay { background: rgba(10,15,30,.92); }
  .spinner-tc { width: 3rem; height: 3rem; border-width: .35rem;
    border-color: var(--tc-blue) transparent var(--tc-blue) transparent; }
  [data-theme="dark"] .spinner-tc { border-color: var(--tc-sky) transparent var(--tc-sky) transparent; }
  #loading-msg { color: var(--text-muted2); font-weight: 500; margin-top: .75rem; }

  /* 言語ボタン */
  #btn-lang { font-size: 0.75rem; min-width: 2.8rem; }

  /* 差分メタバー */
  .diff-meta-bar {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 10px; padding: 12px 16px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .diff-meta-bar .diff-badge-group { display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay">
  <div class="spinner-border spinner-tc"></div>
  <div id="loading-msg">Tableau Cloud からワークブックを取得中...</div>
</div>

<!-- ナビゲーション -->
<nav class="navbar navbar-expand-lg px-3 py-2">
  <span class="navbar-brand text-white">
    <i class="bi bi-diagram-3 me-2" style="color:var(--tc-sky)"></i>Workbook Analyzer for Tableau
    <span id="app-version" class="badge bg-secondary ms-1" style="font-size:0.62rem;font-weight:400;opacity:0.75;vertical-align:middle"></span>
  </span>
  <div class="ms-auto d-flex align-items-center gap-2">
    <span id="status-bar" class="text-white-50 small"></span>
    <button id="btn-lang" class="btn btn-sm btn-outline-light px-2" onclick="toggleLang()" title="Switch language / 言語切替">
      <span id="lang-label">EN</span>
    </button>
    <button class="btn btn-sm btn-outline-light px-2" onclick="doRefresh()" title="ワークブック一覧を再取得">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
    <button class="btn btn-sm btn-outline-light px-2" onclick="toggleTheme()" title="ダークモード切替">
      <i class="bi bi-moon-fill" id="dark-icon" style="font-size:0.85rem"></i>
    </button>
  </div>
</nav>

<!-- メインコンテンツ -->
<div id="main-content" class="container-fluid px-3 pt-3 pb-5" style="display:none">
  <ul class="nav nav-tabs mb-3" id="mainTabs">
    <li class="nav-item">
      <a class="nav-link active" data-bs-toggle="tab" href="#tab-diff">
        <i class="bi bi-clock-history me-1"></i><span data-i18n="nav_diff">リビジョン差分</span>
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" data-bs-toggle="tab" href="#tab-fields">
        <i class="bi bi-diagram-2 me-1"></i><span data-i18n="nav_fields">計算フィールド分析</span>
      </a>
    </li>
  </ul>

  <div class="tab-content">

    <!-- ── リビジョン差分タブ ── -->
    <div class="tab-pane fade show active" id="tab-diff">
      <div class="card border-0 shadow-sm p-3">
        <div class="row g-2 align-items-end mb-3">

          <!-- ワークブック検索 -->
          <div class="col-md-5">
            <label class="form-label small text-muted mb-1" data-i18n="lbl_wb_search">ワークブックを検索</label>
            <div class="position-relative" id="diff-wb-wrap">
              <input type="text" id="diff-wb-input" class="form-control form-control-sm pe-4"
                     autocomplete="off" placeholder="— 名前またはプロジェクトで検索 —"
                     oninput="filterWbDropdown('diff', this.value); toggleClear('diff')"
                     onfocus="showWbDropdown('diff')" />
              <span id="diff-wb-clear" onclick="clearWbSearch('diff')"
                    style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:#999;font-size:1rem;line-height:1;">&times;</span>
              <div class="wb-dropdown" id="diff-wb-dropdown"></div>
              <input type="hidden" id="diff-wb-value" />
            </div>
          </div>

          <!-- 比較元 -->
          <div class="col-md-2">
            <label class="form-label small text-muted mb-1" data-i18n="lbl_base">比較元 (Base)</label>
            <select id="diff-base-select" class="form-select form-select-sm" disabled>
              <option value="">—</option>
            </select>
          </div>

          <div class="col-auto d-flex align-items-end pb-1">
            <i class="bi bi-arrow-right text-muted"></i>
          </div>

          <!-- 比較先 -->
          <div class="col-md-2">
            <label class="form-label small text-muted mb-1" data-i18n="lbl_head">比較先 (Head)</label>
            <select id="diff-head-select" class="form-select form-select-sm" disabled>
              <option value="">—</option>
            </select>
          </div>

          <div class="col-md-2 d-flex gap-1">
            <button id="diff-run-btn" class="btn btn-sm btn-primary flex-grow-1" onclick="runDiff()" disabled>
              <i class="bi bi-search me-1"></i><span data-i18n="btn_compare">比較を実行</span>
            </button>
            <button id="diff-csv-btn" class="btn btn-sm btn-outline-secondary" onclick="downloadDiffCSV()" disabled title="CSVをダウンロード">
              <i class="bi bi-download"></i>
            </button>
          </div>
        </div>

        <div id="diff-result">
          <div class="text-muted small text-center py-4" data-i18n="diff_placeholder">ワークブックを選択して比較を実行してください</div>
        </div>
      </div>
    </div>

    <!-- ── 計算フィールド分析タブ ── -->
    <div class="tab-pane fade" id="tab-fields">
      <div class="card border-0 shadow-sm p-3">
        <div class="row g-2 align-items-end mb-3">

          <!-- ワークブック検索 -->
          <div class="col-md-6">
            <label class="form-label small text-muted mb-1" data-i18n="lbl_wb_search">ワークブックを検索</label>
            <div class="position-relative" id="fields-wb-wrap">
              <input type="text" id="fields-wb-input" class="form-control form-control-sm pe-4"
                     autocomplete="off" placeholder="— 名前またはプロジェクトで検索 —"
                     oninput="filterWbDropdown('fields', this.value); toggleClear('fields')"
                     onfocus="showWbDropdown('fields')" />
              <span id="fields-wb-clear" onclick="clearWbSearch('fields')"
                    style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:#999;font-size:1rem;line-height:1;">&times;</span>
              <div class="wb-dropdown" id="fields-wb-dropdown"></div>
              <input type="hidden" id="fields-wb-value" />
            </div>
          </div>

          <div class="col-auto">
            <button id="fields-run-btn" class="btn btn-sm btn-primary" onclick="runFields()" disabled>
              <i class="bi bi-diagram-2 me-1"></i><span data-i18n="btn_analyze">分析を実行</span>
            </button>
          </div>
        </div>

        <!-- データソース情報パネル（動的挿入） -->

        <!-- フィールド一覧 -->
        <div id="fields-table-wrap" style="display:none" class="mb-3">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <h6 class="fw-bold mb-0" style="color:var(--tc-mid)">
              <i class="bi bi-table me-1"></i><span data-i18n="fields_list">計算フィールド一覧</span>
            </h6>
            <div class="d-flex gap-2">
              <input type="text" id="fields-filter-input" class="form-control form-control-sm"
                     style="width:220px" placeholder="フィールド名・フォーミュラで絞り込み..."
                     oninput="filterFieldsTable(this.value)" />
              <button class="btn btn-sm btn-outline-secondary flex-shrink-0" onclick="downloadFieldsCSV()" title="CSVをダウンロード">
                <i class="bi bi-download"></i>
              </button>
            </div>
          </div>
          <div style="max-height:320px;overflow-y:auto;">
            <table class="table table-sm table-hover mb-0" id="fields-table">
              <thead class="sticky-top">
                <tr>
                  <th data-i18n="th_datasource">データソース</th>
                  <th data-i18n="th_fieldname">フィールド名</th>
                  <th data-i18n="th_formula">計算式（抜粋）</th>
                </tr>
              </thead>
              <tbody id="fields-tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- Sankey チャート -->
        <div id="sankey-wrap" style="display:none">
          <h6 class="fw-bold mb-1" style="color:var(--tc-mid)">
            <i class="bi bi-share me-1"></i><span data-i18n="fields_sankey">フィールド依存関係図</span>
          </h6>
          <p class="text-muted small mb-2" data-i18n="fields_sankey_hint">ノード色はデータソース別。リンクにホバーすると計算式を確認できます。</p>
          <div id="sankey-container"></div>
        </div>

        <div id="fields-result">
          <div class="text-muted small text-center py-4" data-i18n="fields_placeholder">ワークブックを選択して分析を実行してください</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script>
// ─────────────────────────────────────────────
// i18n
// ─────────────────────────────────────────────
const I18N = {
  ja: {
    nav_diff:          'リビジョン差分',
    nav_fields:        '計算フィールド分析',
    lbl_wb_search:     'ワークブックを検索',
    lbl_base:          '比較元 (Base)',
    lbl_head:          '比較先 (Head)',
    btn_compare:       '比較を実行',
    btn_analyze:       '分析を実行',
    diff_placeholder:  'ワークブックを選択して比較を実行してください',
    fields_placeholder:'ワークブックを選択して分析を実行してください',
    fields_list:       '計算フィールド一覧',
    fields_sankey:     'フィールド依存関係図',
    fields_sankey_hint:'ノード色はデータソース別。リンクにホバーすると計算式を確認できます。',
    th_datasource:     'データソース',
    th_fieldname:      'フィールド名',
    th_formula:        '計算式（抜粋）',
    wb_placeholder:    '— 名前またはプロジェクトで検索 —',
    wb_not_found:      '見つかりません',
    loading_msg:       'Tableau Cloud からワークブックを取得中...',
    status_loading:    'ワークブック一覧を取得中...',
    status_refetch:    '再取得中...',
    rev_loading:       'リビジョンを取得中...',
    rev_select_hint:   'リビジョンを選んで「比較を実行」してください',
    rev_no_rev:        '比較できるリビジョンが2件以上ありません',
    diff_computing:    '差分を計算中...',
    diff_no_changes:   'このリビジョン間に変更はありません',
    fields_analyzing:  'ワークブックを解析中...',
    ds_panel_title:    '使用データソース',
    badge_added:       '追加',
    badge_deleted:     '削除',
    badge_changed:     '変更',
    badge_no_change:   '変更なし',
    section_cf:        '計算フィールド',
    section_fl:        'フィルター',
    section_ds:        'データソース',
    section_sh:        'シート',

let _lang = localStorage.getItem('wa_lang') || 'ja';

function t(key) {
  return (I18N[_lang] || I18N.ja)[key] || (I18N.ja)[key] || key;
}

function applyLang(lang) {
  _lang = lang;
  localStorage.setItem('wa_lang', lang);
  document.documentElement.lang = lang;
  document.getElementById('lang-label').textContent = lang === 'ja' ? 'EN' : 'JA';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const val = (I18N[lang] || I18N.ja)[key];
    if (val !== undefined) el.textContent = val;
  });
  // プレースホルダーも更新
  ['diff', 'fields'].forEach(p => {
    const inp = document.getElementById(`${p}-wb-input`);
    if (inp && !inp.value) inp.placeholder = t('wb_placeholder');
  });
  const loadingEl = document.getElementById('loading-msg');
  if (loadingEl) loadingEl.textContent = t('loading_msg');
}

function toggleLang() {
  applyLang(_lang === 'ja' ? 'en' : 'ja');
}

const DS_PALETTE = [
  '#2e75b6', '#70ad47', '#ed7d31', '#7030a0',
  '#c00000', '#4472c4', '#00b0f0', '#ffc000',
  '#00b050', '#ff0000',
];

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`HTTP ${r.status}: ${txt}`);
  }
  return r.json();
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('wa_theme', theme);
  const icon = document.getElementById('dark-icon');
  if (icon) icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
}

(function initTheme() {
  const saved = localStorage.getItem('wa_theme') || 'light';
  applyTheme(saved);
})();

let _wbList = [];

async function pollStatus() {
  try {
    const s = await fetchJSON('/api/status');
    const bar = document.getElementById('status-bar');
    if (s.status === 'loading') {
      bar.innerHTML = `<span class="spinner-border spinner-border-sm me-1"></span>${t('status_loading')}`;
      setTimeout(pollStatus, 2000);
    } else if (s.status === 'ok') {
      const dt = s.fetched_at ? new Date(s.fetched_at).toLocaleString() : '';
      bar.innerHTML = `<i class="bi bi-check-circle text-success me-1"></i>${s.workbook_count}件 — ${dt}`;
      if (s.version) {
        const vEl = document.getElementById('app-version');
        if (vEl) vEl.textContent = `v${s.version}`;
      }
      await loadWorkbooks();
      // ローディングオーバーレイを非表示
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
    } else {
      bar.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-triangle me-1"></i>${esc(s.error)}</span>`;
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
    }
  } catch(e) {
    setTimeout(pollStatus, 3000);
  }
}

async function loadWorkbooks() {
  const data = await fetchJSON('/api/workbooks');
  _wbList = (data.workbooks || []).sort((a, b) => a.name.localeCompare(b.name));
}

async function doRefresh() {
  await fetch('/api/refresh', { method: 'POST' });
  document.getElementById('status-bar').innerHTML =
    `<span class="spinner-border spinner-border-sm me-1"></span>${t('status_refetch')}`;
  setTimeout(pollStatus, 1000);
}

// ─────────────────────────────────────────────
// 共通: ワークブック検索ドロップダウン
// ─────────────────────────────────────────────
function filterWbDropdown(prefix, query) {
  const q = (query || '').toLowerCase();
  const filtered = q ? _wbList.filter(w =>
    w.name.toLowerCase().includes(q) || (w.project || '').toLowerCase().includes(q)
  ) : _wbList;
  _renderWbDropdown(prefix, filtered);
  document.getElementById(`${prefix}-wb-value`).value = '';
  const btn = document.getElementById(`${prefix}-run-btn`);
  if (btn) btn.disabled = true;
}

function showWbDropdown(prefix) {
  const q = (document.getElementById(`${prefix}-wb-input`) || {}).value || '';
  filterWbDropdown(prefix, q);
}

function _renderWbDropdown(prefix, list) {
  const dd = document.getElementById(`${prefix}-wb-dropdown`);
  if (!dd) return;
  if (!list.length) {
    dd.innerHTML = `<div class="wb-item text-muted">${t('wb_not_found')}</div>`;
    dd.style.display = 'block';
    return;
  }
  dd.innerHTML = list.map(w =>
    `<div class="wb-item" onmousedown="selectWb('${prefix}','${esc(w.id)}','${esc(w.name + (w.project ? ' (' + w.project + ')' : ''))}')">`+
    `${esc(w.name)}<span class="text-muted ms-1 small">${w.project ? esc(w.project) : ''}</span></div>`
  ).join('');
  dd.style.display = 'block';
}

function selectWb(prefix, id, label) {
  document.getElementById(`${prefix}-wb-input`).value = label;
  document.getElementById(`${prefix}-wb-value`).value = id;
  document.getElementById(`${prefix}-wb-dropdown`).style.display = 'none';
  toggleClear(prefix);
  if (prefix === 'diff') onDiffWbSelect(id);
  if (prefix === 'fields') {
    document.getElementById('fields-run-btn').disabled = false;
  }
}

function toggleClear(prefix) {
  const inp = document.getElementById(`${prefix}-wb-input`);
  const btn = document.getElementById(`${prefix}-wb-clear`);
  if (btn) btn.style.display = inp && inp.value ? 'block' : 'none';
}

function clearWbSearch(prefix) {
  const inp = document.getElementById(`${prefix}-wb-input`);
  const val = document.getElementById(`${prefix}-wb-value`);
  const btn = document.getElementById(`${prefix}-wb-clear`);
  if (inp) inp.value = '';
  if (val) val.value = '';
  if (btn) btn.style.display = 'none';
  filterWbDropdown(prefix, '');
  const runBtn = document.getElementById(`${prefix}-run-btn`);
  if (runBtn) runBtn.disabled = true;
  if (prefix === 'diff') {
    const baseEl = document.getElementById('diff-base-select');
    const headEl = document.getElementById('diff-head-select');
    if (baseEl) { baseEl.innerHTML = '<option value="">—</option>'; baseEl.disabled = true; }
    if (headEl) { headEl.innerHTML = '<option value="">—</option>'; headEl.disabled = true; }
  }
}

document.addEventListener('click', e => {
  ['diff', 'fields'].forEach(prefix => {
    const wrap = document.getElementById(`${prefix}-wb-wrap`);
    if (wrap && !wrap.contains(e.target)) {
      const dd = document.getElementById(`${prefix}-wb-dropdown`);
      if (dd) dd.style.display = 'none';
    }
  });
});

async function onDiffWbSelect(wbId) {
  const baseEl = document.getElementById('diff-base-select');
  const headEl = document.getElementById('diff-head-select');
  const btn    = document.getElementById('diff-run-btn');
  baseEl.innerHTML = '<option value="">—</option>';
  headEl.innerHTML = '<option value="">—</option>';
  baseEl.disabled = true;
  headEl.disabled = true;
  btn.disabled = true;

  document.getElementById('diff-result').innerHTML =
    `<div class="text-muted small text-center py-3"><span class="spinner-border spinner-border-sm me-2"></span>${t('rev_loading')}</div>`;

  try {
    const data = await fetchJSON(`/api/workbooks/${wbId}/revisions`);
    const revs = data.revisions || [];
    if (revs.length < 2) {
      document.getElementById('diff-result').innerHTML =
        `<div class="text-muted small text-center py-3">${t('rev_no_rev')}</div>`;
      return;
    }
    const opts = revs.map(r => {
      const dt  = r.created_at ? new Date(r.created_at).toLocaleString() : '';
      const cur = r.is_current ? ' ★' : '';
      return `<option value="${r.revision_number}">v${r.revision_number}${cur} — ${dt}${r.publisher ? ' (' + esc(r.publisher) + ')' : ''}</option>`;
    }).join('');
    baseEl.innerHTML = opts;
    headEl.innerHTML = opts;
    headEl.value = revs[0].revision_number;
    baseEl.value = revs[1].revision_number;
    baseEl.disabled = false;
    headEl.disabled = false;
    btn.disabled = false;
    document.getElementById('diff-result').innerHTML =
      `<div class="text-muted small text-center py-3">${t('rev_select_hint')}</div>`;
  } catch(e) {
    document.getElementById('diff-result').innerHTML =
      `<div class="text-danger small text-center py-3">${t('err_fetch')}${esc(String(e))}</div>`;
  }
}

async function runDiff() {
  const wbId    = document.getElementById('diff-wb-value').value;
  const baseRev = document.getElementById('diff-base-select').value;
  const headRev = document.getElementById('diff-head-select').value;
  const btn     = document.getElementById('diff-run-btn');
  if (!wbId) return;

  btn.disabled = true;
  document.getElementById('diff-result').innerHTML =
    `<div class="text-muted small text-center py-3"><span class="spinner-border spinner-border-sm me-2"></span>${t('diff_computing')}</div>`;

  try {
    const data = await fetchJSON(`/api/workbooks/${wbId}/revision-diff?base=${baseRev}&head=${headRev}`);
    renderDiff(data);
  } catch(e) {
    document.getElementById('diff-result').innerHTML =
      `<div class="text-danger small text-center py-3">${t('err_diff')}${esc(String(e))}</div>`;
  } finally {
    btn.disabled = false;
  }
}

let _diffSectionOpen = { cf: true, fl: true, ds: true, sh: true };

function toggleDiffSection(key) {
  _diffSectionOpen[key] = !_diffSectionOpen[key];
  renderDiff(_lastDiffData);
}

function renderDiff(data) {
  _lastDiffData = data;
  const csvBtn = document.getElementById('diff-csv-btn');
  if (csvBtn) csvBtn.disabled = false;
  const diff = data.diff || {};
  const bRev = data.base_revision || {};
  const hRev = data.head_revision || {};

  const _revLabel = r => {
    const dt  = r.created_at ? new Date(r.created_at).toLocaleString() : '—';
    const pub = r.publisher  ? ` (${esc(r.publisher)})`                : '';
    return `<strong>v${esc(r.revision_number)}</strong>&nbsp;<span style="color:var(--text-muted2)">${dt}${pub}</span>`;
  };

  const totalAdded =
    (diff.calculated_fields?.added?.length  || 0) +
    (diff.filters?.added?.length            || 0) +
    (diff.datasources?.added?.length        || 0) +
    (diff.sheets?.added?.length             || 0);
  const totalChanged =
    (diff.calculated_fields?.changed?.length || 0) +
    (diff.filters?.changed?.length           || 0);
  const totalDeleted =
    (diff.calculated_fields?.deleted?.length || 0) +
    (diff.filters?.deleted?.length           || 0) +
    (diff.datasources?.deleted?.length       || 0) +
    (diff.sheets?.deleted?.length            || 0);
  const totalChanges = totalAdded + totalChanged + totalDeleted;

  // メタバー
  let html = `<div class="diff-meta-bar">
    <div style="flex:1;min-width:0">${_revLabel(bRev)}&nbsp;<i class="bi bi-arrow-right mx-1" style="color:var(--text-muted2)"></i>&nbsp;${_revLabel(hRev)}</div>
    <div class="diff-badge-group">
      ${totalAdded   ? `<span class="diff-stat-badge new"><i class="bi bi-plus-circle-fill"></i>+${totalAdded}</span>` : ''}
      ${totalChanged ? `<span class="diff-stat-badge changed"><i class="bi bi-pencil-fill"></i>~${totalChanged}</span>` : ''}
      ${totalDeleted ? `<span class="diff-stat-badge deleted"><i class="bi bi-dash-circle-fill"></i>-${totalDeleted}</span>` : ''}
      ${!totalChanges ? `<span class="diff-stat-badge new"><i class="bi bi-check-circle-fill"></i>${t('diff_no_changes')}</span>` : ''}
    </div>
  </div>`;

  if (totalChanges === 0) {
    document.getElementById('diff-result').innerHTML = html;
    return;
  }

  function _sectionType(added, deleted, changed) {
    if (added && !deleted && !changed) return 'new-section';
    if (!added && deleted && !changed) return 'deleted-section';
    if (changed) return 'changed-section';
    if (added || deleted) return 'changed-section';
    return 'neutral-section';
  }

  function _sectionHeader(key, label, added, deleted, changed) {
    const open  = _diffSectionOpen[key];
    const total = added + deleted + changed;
    const chevClass = open ? '' : ' collapsed';
    return `<div class="diff-section-header${chevClass}" onclick="toggleDiffSection('${key}')">
      <i class="bi bi-chevron-down diff-section-chevron"></i>
      <span>${label}</span>
      ${added   ? `<span class="badge badge-add ms-1">+${added}</span>` : ''}
      ${deleted ? `<span class="badge badge-del ms-1">-${deleted}</span>` : ''}
      ${changed ? `<span class="badge badge-chg ms-1">~${changed}</span>` : ''}
      ${!total  ? `<span class="badge bg-secondary ms-1">${t('badge_no_change')}</span>` : ''}
      <span class="diff-count">${total}</span>
    </div>`;
  }

  // 計算フィールド
  const cf = diff.calculated_fields || {};
  const cfA = cf.added?.length || 0, cfD = cf.deleted?.length || 0, cfC = cf.changed?.length || 0;
  const cfType = _sectionType(cfA, cfD, cfC);
  html += `<div class="diff-section ${cfType}">` + _sectionHeader('cf', t('section_cf'), cfA, cfD, cfC);
  if (_diffSectionOpen.cf && (cfA || cfD || cfC)) {
    html += '<div class="diff-section-body">';
    (cf.added || []).forEach(f => {
      html += `<div class="diff-item"><span class="badge badge-add me-2">${t('badge_added')}</span><strong>${esc(f.field)}</strong> <span class="text-muted small">${esc(f.datasource)}</span>
        <div class="formula-box formula-new">${esc(f.formula)}</div></div>`;
    });
    (cf.deleted || []).forEach(f => {
      html += `<div class="diff-item"><span class="badge badge-del me-2">${t('badge_deleted')}</span><strong>${esc(f.field)}</strong> <span class="text-muted small">${esc(f.datasource)}</span>
        <div class="formula-box formula-old">${esc(f.formula)}</div></div>`;
    });
    (cf.changed || []).forEach(f => {
      html += `<div class="diff-item"><span class="badge badge-chg me-2">${t('badge_changed')}</span><strong>${esc(f.field)}</strong> <span class="text-muted small">${esc(f.datasource)}</span>
        <div class="formula-box formula-old">${esc(f.old_formula)}</div>
        <div class="formula-box formula-new">${esc(f.new_formula)}</div></div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // フィルター
  const fl = diff.filters || {};
  const flA = fl.added?.length || 0, flD = fl.deleted?.length || 0, flC = fl.changed?.length || 0;
  const flType = _sectionType(flA, flD, flC);
  html += `<div class="diff-section ${flType}">` + _sectionHeader('fl', t('section_fl'), flA, flD, flC);
  if (_diffSectionOpen.fl && (flA || flD || flC)) {
    html += '<div class="diff-section-body">';
    (fl.added || []).forEach(f => {
      html += `<div class="diff-item"><span class="badge badge-add me-2">${t('badge_added')}</span>${esc(f.field)} <span class="text-muted small">${esc(f.sheet)}</span></div>`;
    });
    (fl.deleted || []).forEach(f => {
      html += `<div class="diff-item"><span class="badge badge-del me-2">${t('badge_deleted')}</span>${esc(f.field)} <span class="text-muted small">${esc(f.sheet)}</span></div>`;
    });
    (fl.changed || []).forEach(f => {
      html += `<div class="diff-item"><span class="badge badge-chg me-2">${t('badge_changed')}</span>${esc(f.field)} <span class="text-muted small">${esc(f.sheet || '')}</span></div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // データソース
  const ds = diff.datasources || {};
  const dsA = ds.added?.length || 0, dsD = ds.deleted?.length || 0;
  const dsType = _sectionType(dsA, dsD, 0);
  html += `<div class="diff-section ${dsType}">` + _sectionHeader('ds', t('section_ds'), dsA, dsD, 0);
  if (_diffSectionOpen.ds && (dsA || dsD)) {
    html += '<div class="diff-section-body">';
    (ds.added || []).forEach(d => {
      html += `<div class="diff-item"><span class="badge badge-add me-2">${t('badge_added')}</span>${esc(d.caption || d.name)}</div>`;
    });
    (ds.deleted || []).forEach(d => {
      html += `<div class="diff-item"><span class="badge badge-del me-2">${t('badge_deleted')}</span>${esc(d.caption || d.name)}</div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // シート
  const sh = diff.sheets || {};
  const shA = sh.added?.length || 0, shD = sh.deleted?.length || 0;
  const shType = _sectionType(shA, shD, 0);
  html += `<div class="diff-section ${shType}">` + _sectionHeader('sh', t('section_sh'), shA, shD, 0);
  if (_diffSectionOpen.sh && (shA || shD)) {
    html += '<div class="diff-section-body">';
    (sh.added || []).forEach(s => {
      html += `<div class="diff-item"><span class="badge badge-add me-2">${t('badge_added')}</span>${esc(s.name)} <span class="text-muted small">${esc(s.type)}</span></div>`;
    });
    (sh.deleted || []).forEach(s => {
      html += `<div class="diff-item"><span class="badge badge-del me-2">${t('badge_deleted')}</span>${esc(s.name)} <span class="text-muted small">${esc(s.type)}</span></div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  document.getElementById('diff-result').innerHTML = html;
}

let _allFields = [];

async function runFields() {
  const wbId = document.getElementById('fields-wb-value').value;
  const btn  = document.getElementById('fields-run-btn');
  if (!wbId) return;

  btn.disabled = true;
  document.getElementById('fields-result').innerHTML =
    `<div class="text-muted small text-center py-3"><span class="spinner-border spinner-border-sm me-2"></span>${t('fields_analyzing')}</div>`;
  document.getElementById('fields-table-wrap').style.display = 'none';
  document.getElementById('sankey-wrap').style.display = 'none';
  const dsPanel = document.getElementById('fields-ds-panel');
  if (dsPanel) dsPanel.remove();

  try {
    const data = await fetchJSON(`/api/workbooks/${wbId}/fields`);
    _allFields = data.calculated_fields || [];

    // データソース情報パネル（色付きカード）
    const datasources = data.datasources || [];
    if (datasources.length) {
      const dsNames  = [...new Set(_allFields.map(f => f.datasource))];
      const dsColors = Object.fromEntries(dsNames.map((n, i) => [n, DS_PALETTE[i % DS_PALETTE.length]]));

      const panel = document.createElement('div');
      panel.id = 'fields-ds-panel';
      panel.className = 'mb-3';
      panel.innerHTML =
        `<div class="mb-2 fw-bold small" style="color:var(--text-secondary2)">
           <i class="bi bi-database me-1"></i>${t('ds_panel_title')}（${datasources.length}件）
         </div>
         <div class="d-flex flex-wrap gap-2">` +
        datasources.map(d => {
          const color = dsColors[d.caption || d.name] || dsColors[d.name] || '#aaa';
          const conns = (d.connections || []).length
            ? d.connections.map(c =>
                `<span class="badge bg-secondary me-1" style="font-size:.7rem">${esc(c.type)}${c.server ? ': ' + esc(c.server) : ''}${c.database ? ' / ' + esc(c.database) : ''}</span>`
              ).join('')
            : '';
          return `<div class="card border-0 px-3 py-2" style="border-left:4px solid ${color}!important;box-shadow:0 1px 4px rgba(0,0,0,.08);min-width:180px">
              <div class="fw-semibold small mb-1" style="color:${color}">
                <i class="bi bi-database-fill me-1"></i>${esc(d.caption || d.name)}
              </div>
              ${conns}
            </div>`;
        }).join('') + '</div>';
      document.getElementById('fields-table-wrap').before(panel);
    }

    renderFieldsTable(_allFields);
    renderSankey(_allFields);
    document.getElementById('fields-result').innerHTML = '';
  } catch(e) {
    document.getElementById('fields-result').innerHTML =
      `<div class="text-danger small text-center py-3">${t('err_analyze')}${esc(String(e))}</div>`;
  } finally {
    btn.disabled = false;
  }
}

function renderFieldsTable(fields) {
  const tbody = document.getElementById('fields-tbody');
  if (!fields.length) {
    document.getElementById('fields-table-wrap').style.display = 'none';
    return;
  }
  const dsNames  = [...new Set(_allFields.map(f => f.datasource))];
  const dsColors = Object.fromEntries(dsNames.map((n, i) => [n, DS_PALETTE[i % DS_PALETTE.length]]));

  tbody.innerHTML = fields.map(f => {
    const color   = dsColors[f.datasource] || '#aaa';
    const preview = f.formula.length > 80 ? esc(f.formula.slice(0, 80)) + '…' : esc(f.formula);
    return `<tr>
      <td><span class="badge" style="background:${color}">${esc(f.datasource)}</span></td>
      <td class="fw-semibold">${esc(f.field)}</td>
      <td>
        <div class="d-flex align-items-start gap-1">
          <code class="small text-muted flex-grow-1">${preview}</code>
          <button class="btn btn-sm p-0 px-1 btn-outline-secondary copy-formula-btn"
                  data-formula="${esc(f.formula)}" title="計算式をコピー"
                  style="font-size:0.7rem;line-height:1.4;flex-shrink:0"
                  onclick="event.stopPropagation();copyFormula(this)">
            <i class="bi bi-clipboard"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('fields-table-wrap').style.display = 'block';
}

function filterFieldsTable(query) {
  const q = query.toLowerCase();
  const filtered = q ? _allFields.filter(f =>
    f.field.toLowerCase().includes(q) || f.formula.toLowerCase().includes(q)
  ) : _allFields;
  renderFieldsTable(filtered);
}

// コピーボタン
function copyFormula(btn) {
  const formula = btn.dataset.formula;
  function onCopied() {
    btn.classList.add('copied');
    btn.innerHTML = '<i class="bi bi-check2"></i>';
    setTimeout(() => {
      if (window._sankeyTooltipUnpin) window._sankeyTooltipUnpin();
      btn.classList.remove('copied');
      btn.innerHTML = '<i class="bi bi-clipboard"></i>';
    }, 800);
  }
  navigator.clipboard.writeText(formula).then(onCopied).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = formula; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    onCopied();
  });
}

// ─────────────────────────────────────────────
// Sankey 依存関係図（ツールチップ付き）
// ─────────────────────────────────────────────
function renderSankey(fields) {
  d3.select('#sankey-container').selectAll('*').remove();

  if (!fields.length) {
    document.getElementById('sankey-wrap').style.display = 'none';
    return;
  }

  const fieldNames = new Set(fields.map(f => f.field));
  const edgesMap   = {};

  fields.forEach(f => {
    const refs = [...f.formula.matchAll(/\[([^\]]+)\]/g)].map(m => m[1]);
    refs.forEach(ref => {
      if (!fieldNames.has(ref) || ref === f.field) return;
      const key = `${ref}->${f.field}`;
      if (!edgesMap[key]) {
        edgesMap[key] = { source: ref, target: f.field, weight: 1, formula: f.formula, datasource: f.datasource };
      } else {
        edgesMap[key].weight++;
      }
    });
  });

  const edges = Object.values(edgesMap);
  if (!edges.length) {
    document.getElementById('sankey-wrap').style.display = 'none';
    return;
  }

  const dsNames  = [...new Set(fields.map(f => f.datasource))];
  const dsColors = Object.fromEntries(dsNames.map((n, i) => [n, DS_PALETTE[i % DS_PALETTE.length]]));
  const fieldDs  = Object.fromEntries(fields.map(f => [f.field, f.datasource]));

  const nodeNames = new Set();
  edges.forEach(e => { nodeNames.add(e.source); nodeNames.add(e.target); });
  const nodes = Array.from(nodeNames).map(name => ({
    name,
    color:      dsColors[fieldDs[name]] || '#aaa',
    datasource: fieldDs[name]           || '（不明）',
  }));
  const nodeIdx = Object.fromEntries(nodes.map((n, i) => [n.name, i]));
  const links   = edges.map(e => ({
    source:     nodeIdx[e.source],
    target:     nodeIdx[e.target],
    value:      Math.max(1, e.weight),
    formula:    e.formula || '',
    datasource: e.datasource || '',
  }));

  const container = document.getElementById('sankey-container');
  const W = Math.max(container.getBoundingClientRect().width || container.offsetWidth || 900, 600);
  const H = Math.max(400, nodes.length * 28);
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  const svg = d3.select('#sankey-container')
    .append('svg')
    .attr('width', W)
    .attr('height', H)
    .style('width', '100%')
    .style('display', 'block');

  const sankey = d3.sankey()
    .nodeWidth(16)
    .nodePadding(12)
    .extent([[1, 1], [W - 1, H - 6]]);

  const graph = sankey({
    nodes: nodes.map(d => ({ ...d })),
    links: links.map(d => ({ ...d })),
  });

  // ツールチップ
  const tooltip = d3.select('#sankey-container')
    .append('div')
    .classed('sankey-tooltip', true)
    .style('pointer-events', 'none');

  let _pinned = false;
  window._sankeyTooltipUnpin = null;

  function unpinTooltip() {
    _pinned = false;
    tooltip.style('display', 'none').style('pointer-events', 'none');
    window._sankeyTooltipUnpin = null;
  }

  function positionTooltip(event) {
    const tipNode = tooltip.node();
    const cW = container.clientWidth;
    const cH = container.clientHeight;
    const tW = tipNode.offsetWidth;
    const tH = tipNode.offsetHeight;
    const x = event.offsetX, y = event.offsetY;
    const left = (x + 14 + tW > cW) ? Math.max(0, x - tW - 14) : x + 14;
    const top  = (y + 14 + tH > cH) ? Math.max(0, y - tH - 14) : y + 14;
    tooltip.style('left', left + 'px').style('top', top + 'px');
  }

  function showTooltip(event, html) {
    tooltip.style('display', 'block').html(html);
    positionTooltip(event);
  }

  function hideTooltip() { tooltip.style('display', 'none'); }

  function _linkHtml(d, pinned) {
    const title = `<strong>${esc(d.source.name)} → ${esc(d.target.name)}</strong><hr class="my-1">`;
    const code  = `<code style="font-size:11px;display:block;white-space:pre-wrap;word-break:break-all">${esc(d.formula)}</code>`;
    if (pinned) {
      return title + code
        + `<div class="d-flex justify-content-end mt-2 gap-1">`
        + `<button onclick="copyFormula(this)" data-formula="${esc(d.formula)}"
             class="btn btn-sm btn-primary py-0 px-2" style="font-size:0.75rem;pointer-events:auto">
             <i class="bi bi-clipboard me-1"></i>${t('copy_btn')}</button>`
        + `<button onclick="window._sankeyTooltipUnpin&&window._sankeyTooltipUnpin()"
             class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:0.75rem;pointer-events:auto">✕</button>`
        + `</div>`;
    }
    return title + code
      + `<div class="text-muted mt-1" style="font-size:0.65rem">${t('copy_hint')}</div>`;
  }

  function resetAllLinks() {
    svg.selectAll('path.sankey-link')
      .attr('stroke',         isDark ? '#3a5a80' : '#ccc')
      .attr('stroke-opacity', isDark ? 0.55 : 0.45);
  }

  svg.append('g').selectAll('path')
    .data(graph.links)
    .join('path')
    .attr('class', 'sankey-link')
    .attr('d',              d3.sankeyLinkHorizontal())
    .attr('stroke',         isDark ? '#3a5a80' : '#ccc')
    .attr('stroke-width',   d => Math.max(1, d.width))
    .attr('fill',           'none')
    .attr('stroke-opacity', isDark ? 0.55 : 0.45)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
      if (_pinned) return;
      resetAllLinks();
      d3.select(this).attr('stroke', isDark ? '#6ab0f0' : 'orange').attr('stroke-opacity', 0.9);
      tooltip.style('display', 'block').html(_linkHtml(d, false));
      positionTooltip(event);
    })
    .on('mousemove', function(event) { if (!_pinned) positionTooltip(event); })
    .on('mouseout',  function() {
      if (_pinned) return;
      resetAllLinks();
      hideTooltip();
    })
    .on('click', function(event, d) {
      event.stopPropagation();
      _pinned = true;
      tooltip
        .style('display', 'block')
        .style('pointer-events', 'auto')
        .html(_linkHtml(d, true));
      positionTooltip(event);
      window._sankeyTooltipUnpin = unpinTooltip;
    });

  svg.on('click', function() {
    if (_pinned) unpinTooltip();
    resetAllLinks();
  });

  const node = svg.append('g').selectAll('g')
    .data(graph.nodes)
    .join('g');

  node.append('rect')
    .attr('x',      d => d.x0)
    .attr('y',      d => d.y0)
    .attr('height', d => Math.max(1, d.y1 - d.y0))
    .attr('width',  d => d.x1 - d.x0)
    .attr('fill',   d => d.color)
    .attr('rx',     2)
    .on('mouseover', function(event, d) {
      svg.selectAll('path.sankey-link')
        .attr('stroke', l => (l.source?.name === d.name || l.target?.name === d.name) ? d.color : (isDark ? '#3a5a80' : '#ccc'))
        .attr('stroke-opacity', l => (l.source?.name === d.name || l.target?.name === d.name) ? 0.85 : 0.15);
      showTooltip(event,
        `<strong>${esc(d.name)}</strong><br>` +
        `<span class="text-muted">📂 ${esc(d.datasource)}</span>`);
    })
    .on('mousemove', function(event) { positionTooltip(event); })
    .on('mouseout',  function() { resetAllLinks(); hideTooltip(); });

  node.append('text')
    .attr('x',            d => d.x0 < W / 2 ? d.x1 + 7 : d.x0 - 7)
    .attr('y',            d => (d.y0 + d.y1) / 2)
    .attr('dy',           '0.35em')
    .attr('text-anchor',  d => d.x0 < W / 2 ? 'start' : 'end')
    .attr('font-size',    '12px')
    .attr('font-weight',  '500')
    .attr('fill',         isDark ? '#dce8ff' : '#1a1a2e')
    .attr('stroke',       isDark ? 'rgba(10,18,38,0.9)' : 'rgba(255,255,255,0.9)')
    .attr('stroke-width', '2.5')
    .attr('paint-order',  'stroke fill')
    .text(d => d.name.length > 30 ? d.name.slice(0, 29) + '…' : d.name)
    .append('title').text(d => d.name);

  document.getElementById('sankey-wrap').style.display = 'block';
}

// ─────────────────────────────────────────────
// CSV ダウンロード
// ─────────────────────────────────────────────
let _lastDiffData = null;

function _csvEscape(v) {
  const s = String(v ?? '');
  return s.includes(',') || s.includes('"') || s.includes('\n')
    ? '"' + s.replace(/"/g, '""') + '"'
    : s;
}

function _downloadCSV(rows, filename) {
  const bom = '﻿';
  const csv = bom + rows.map(r => r.map(_csvEscape).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadDiffCSV() {
  if (!_lastDiffData) return;
  const diff   = _lastDiffData.diff || {};
  const wbName = _lastDiffData.workbook_name || 'workbook';
  const bRev   = (_lastDiffData.base_revision || {}).revision_number || '';
  const hRev   = (_lastDiffData.head_revision || {}).revision_number || '';
  const rows   = [['カテゴリ', '変更種別', 'フィールド名/シート名', 'データソース', '変更前', '変更後']];

  const cf = diff.calculated_fields || {};
  (cf.added   || []).forEach(f => rows.push(['計算フィールド', '追加', f.field, f.datasource, '', f.formula]));
  (cf.deleted || []).forEach(f => rows.push(['計算フィールド', '削除', f.field, f.datasource, f.formula, '']));
  (cf.changed || []).forEach(f => rows.push(['計算フィールド', '変更', f.field, f.datasource, f.old_formula, f.new_formula]));

  const fl = diff.filters || {};
  (fl.added   || []).forEach(f => rows.push(['フィルター', '追加', f.field, f.sheet || '', '', '']));
  (fl.deleted || []).forEach(f => rows.push(['フィルター', '削除', f.field, f.sheet || '', '', '']));
  (fl.changed || []).forEach(f => rows.push(['フィルター', '変更', f.field, f.sheet || '', '', '']));

  const ds = diff.datasources || {};
  (ds.added   || []).forEach(d => rows.push(['データソース', '追加', d.caption || d.name, '', '', '']));
  (ds.deleted || []).forEach(d => rows.push(['データソース', '削除', d.caption || d.name, '', '', '']));

  const sh = diff.sheets || {};
  (sh.added   || []).forEach(s => rows.push(['シート', '追加', s.name, s.type, '', '']));
  (sh.deleted || []).forEach(s => rows.push(['シート', '削除', s.name, s.type, '', '']));

  _downloadCSV(rows, `diff_${wbName}_v${bRev}_v${hRev}.csv`);
}

function downloadFieldsCSV() {
  if (!_allFields.length) return;
  const wbName = (document.getElementById('fields-wb-input') || {}).value || 'workbook';
  const rows   = [['データソース', 'フィールド名', 'フォーミュラ']];
  _allFields.forEach(f => rows.push([f.datasource, f.field, f.formula]));
  _downloadCSV(rows, `fields_${wbName}.csv`);
}

// ─────────────────────────────────────────────
// 起動
// ─────────────────────────────────────────────
applyLang(_lang);
pollStatus();
</script>
